# ET1 Training Configuration
# Single source of truth for all hyperparameters.
# ALL conditions use identical training config — the only IV is data format.

# --- Knowledge Base ---
knowledge_base:
  seed: 42
  world_name: "Meridian"
  total_facts: 3500
  splits:
    train: 2000
    val: 500
    test_id: 500    # In-distribution: new facts about seen entities
    test_ood: 500   # Out-of-distribution: new entity types entirely
  confidence_tiers:
    T1_established:
      belief_range: [0.90, 0.99]
      fraction: 0.30
    T2_probable:
      belief_range: [0.70, 0.89]
      fraction: 0.25
    T3_uncertain:
      belief_range: [0.40, 0.69]
      fraction: 0.20
    T4_speculative:
      belief_range: [0.15, 0.39]
      fraction: 0.15
    T5_contested:
      belief_range: [0.30, 0.60]
      disbelief_range: [0.20, 0.50]
      fraction: 0.10

# --- Training Conditions ---
conditions:
  - id: C1
    name: "plain_text"
    description: "Natural language sentences (primary control)"
  - id: C2
    name: "plain_json"
    description: "Flat key-value JSON (structural control)"
  - id: C3
    name: "json_ld"
    description: "JSON-LD with @context, @type, @id (semantic control)"
  - id: C4
    name: "jsonldex_full"
    description: "Full jsonld-ex with SL opinions, provenance, temporal (treatment)"
  - id: C5
    name: "verbose_text"
    description: "Plain text padded to match C4 token count (length control)"
  - id: C6
    name: "jsonldex_random"
    description: "jsonld-ex structure with randomized SL values (signal control)"
  - id: C7
    name: "scalar_confidence"
    description: "JSON with scalar confidence only (representation control)"

# --- Models ---
pilot_models:
  - name: "HuggingFaceTB/SmolLM2-135M-Instruct"
    short_name: "smollm2-135m"
    params: 135_000_000
    full_finetune: true   # Also run full FT at this size
  - name: "HuggingFaceTB/SmolLM2-360M-Instruct"
    short_name: "smollm2-360m"
    params: 360_000_000
    full_finetune: false
  - name: "Qwen/Qwen2.5-0.5B-Instruct"
    short_name: "qwen25-05b"
    params: 500_000_000
    full_finetune: false

scaleup_models:
  - name: "Qwen/Qwen2.5-1.5B-Instruct"
    short_name: "qwen25-15b"
    params: 1_500_000_000
  - name: "meta-llama/Llama-3.2-3B-Instruct"
    short_name: "llama32-3b"
    params: 3_000_000_000

# --- LoRA Configuration ---
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

# --- Training Hyperparameters ---
training:
  learning_rate: 2.0e-4
  lr_scheduler: "cosine"
  warmup_ratio: 0.10
  batch_size: 16          # effective (use grad accumulation if needed)
  per_device_batch_size: 4
  gradient_accumulation_steps: 4
  max_seq_length: 1024
  num_epochs: 5
  early_stopping_patience: 2
  optimizer: "adamw_torch"
  weight_decay: 0.01
  bf16: true
  gradient_checkpointing: true
  seeds: [42, 137, 2024]
  save_strategy: "epoch"
  evaluation_strategy: "epoch"

# --- Evaluation ---
evaluation:
  ece_bins: 15
  bootstrap_resamples: 10000
  bootstrap_ci: 0.95
  significance_level: 0.05
  correction_method: "holm-sidak"
  verbal_confidence_map:
    "certain": 1.0
    "very confident": 0.9
    "fairly confident": 0.8
    "confident": 0.8
    "somewhat confident": 0.65
    "uncertain": 0.5
    "not sure": 0.4
    "doubtful": 0.3
    "very uncertain": 0.2
    "no idea": 0.1
    "don't know": 0.0
  answer_match:
    method: "entity_relation"    # Match entity name + relation, not exact string
    fuzzy_threshold: 0.7         # Normalized similarity threshold for fuzzy fallback
  eval_prompt_style: "freeform"  # "freeform" or "structured" (Protocol §8.1)

# --- Paths ---
paths:
  data_dir: "data"
  results_dir: "results"
  checkpoints_dir: "checkpoints"
  cache_dir: "~/.cache/huggingface"
